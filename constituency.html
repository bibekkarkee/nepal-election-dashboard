<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>निर्वाचन क्षेत्र अनुसार उम्मेदवारहरू</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; }
  header { padding:20px; text-align:center; background:#1e3c72; color:#fff; }
  h1 { margin:0; font-size:24px; }
  .constituency-container { max-width:1200px; margin:20px auto; padding:0 10px; }
  .candidate-card { display:flex; gap:15px; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:12px; align-items:center; background:#fff; transition:0.2s; }
  .candidate-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.15); }
  .candidate-card img { width:70px; height:70px; border-radius:50%; object-fit:cover; }
  .candidate-info { flex:1; }
  .progress-bar { background:#ddd; height:12px; border-radius:6px; margin-top:4px; }
  .progress-fill { height:100%; background:#1e3c72; border-radius:6px; }
  .rank { font-weight:bold; margin-right:10px; }
  .back-btn { display:inline-block; margin:20px 0; padding:8px 15px; background:#1e3c72; color:#fff; border-radius:5px; text-decoration:none; }
  @media (max-width:600px){
    .candidate-card { flex-direction:column; align-items:flex-start; }
    .candidate-card img { width:100%; height:auto; }
  }
</style>
</head>
<body>

<header>
  <h1>निर्वाचन क्षेत्र अनुसार उम्मेदवारहरू</h1>
  <a href="index.html" class="back-btn">🏠 Back to Dashboard</a>
</header>

<div class="constituency-container" id="constituencyContainer">
  <p>Loading candidates...</p>
</div>

<script>
async function loadConstituency() {
  try {
    const params = new URLSearchParams(window.location.search);
    const constituency = params.get('const'); // e.g., "1 - Kathmandu"
    
    const res = await fetch("/.netlify/functions/proxy");
    const json = await res.json();
    const candidates = JSON.parse(json.contents);

    // Filter by selected constituency
    let filtered = candidates;
    if(constituency){
      filtered = candidates.filter(c => (c.SCConstID + " - " + c.DistrictName) === constituency);
    }

    if(filtered.length === 0){
      document.getElementById("constituencyContainer").innerHTML = "<p style='color:red;text-align:center;'>No candidates found for this constituency.</p>";
      return;
    }

    // Total votes in this constituency
    const totalVotes = filtered.reduce((sum, c) => sum + (c.TotalVoteReceived || 0), 0);

    const container = document.getElementById("constituencyContainer");
    container.innerHTML = "";

    // Sort by votes descending
    const sorted = filtered.sort((a,b)=> (b.TotalVoteReceived || 0) - (a.TotalVoteReceived || 0));

    sorted.forEach((c, index)=>{
      const percent = totalVotes ? ((c.TotalVoteReceived || 0)/totalVotes*100).toFixed(1) : 0;
      const rankLabel = index === 0 ? "🥇 1st" : index === 1 ? "🥈 2nd" : index === 2 ? "🥉 3rd" : `${index+1}th`;

      const card = document.createElement("div");
      card.className = "candidate-card";
      card.innerHTML = `
        <img src="https://result.election.gov.np/Images/Candidate/${c.CandidateID}.jpg" alt="${c.CandidateName}">
        <div class="candidate-info">
          <span class="rank">${rankLabel}</span>
          <strong>${c.CandidateName}</strong><br>
          Party: ${c.PoliticalPartyName}<br>
          Province: ${c.StateName}, District: ${c.DistrictName}, Constituency: ${c.SCConstID}<br>
          Votes: ${c.TotalVoteReceived || 0} / ${totalVotes} (${percent}%)
          <div class="progress-bar">
            <div class="progress-fill" style="width:${percent}%"></div>
          </div>
        </div>
      `;
      card.addEventListener("click", ()=> window.location.href=`candidate-detail.html?id=${c.CandidateID}`);
      container.appendChild(card);
    });

  } catch(err){
    console.error(err);
    document.getElementById("constituencyContainer").innerHTML = "<p style='color:red;text-align:center;'>Failed to load candidates.</p>";
  }
}

loadConstituency();
</script>

</body>
</html>
