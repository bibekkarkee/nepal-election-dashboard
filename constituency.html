<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>काठमाडौं निर्वाचन क्षेत्र अनुसार उम्मेदवारहरू</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { font-family:'Segoe UI',sans-serif; background:#f5f5f5; margin:0; padding:0;}
.header { background:#1e3c72; color:white; padding:20px; text-align:center; }
.header h1 { margin:0; font-size:24px; }
.candidate-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }
.candidate-card { background:white; padding:15px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.08); cursor:pointer; transition:.3s;}
.candidate-card:hover { transform:translateY(-5px); }
.candidate-card img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom:10px; }
.candidate-card h3 { margin:5px 0; font-size:18px; }
.candidate-card p { margin:3px 0; font-size:14px; color:#555; }
</style>
</head>
<body>

<div class="header">
    <h1>काठमाडौं निर्वाचन क्षेत्र अनुसार उम्मेदवारहरू</h1>
</div>

<div class="candidate-grid" id="candidateGrid">
    <!-- Candidates will appear here -->
</div>

<script>
const API_URL = "https://api.allorigins.win/get?url=https://result.election.gov.np/JSONFiles/ElectionResultCentral2082.txt";

async function loadKathmanduCandidates() {
    try {
        const res = await fetch(API_URL);
        const json = await res.json();
        const data = JSON.parse(json.contents);

        // Filter only Kathmandu candidates
        const kathmanduCandidates = data.filter(c=>c.DistrictName==="काठमाडौं");

        const container = document.getElementById("candidateGrid");
        container.innerHTML="";

        kathmanduCandidates.forEach(c=>{
            const imgUrl = `https://result.election.gov.np/Images/Candidate/${c.CandidateID || 0}.jpg`;
            const card = document.createElement("div");
            card.className="candidate-card";
            card.innerHTML=`
                <img src="${imgUrl}" alt="${c.CandidateName||'-'}">
                <h3>${c.CandidateName||'-'}</h3>
                <p><strong>Province:</strong> ${c.StateName||'-'}</p>
                <p><strong>District:</strong> ${c.DistrictName||'-'}</p>
                <p><strong>Constituency:</strong> ${c.SCConstID||'-'}</p>
                <p><strong>Party:</strong> ${c.PoliticalPartyName||'-'}</p>
            `;
            card.addEventListener("click", ()=>window.location.href=`candidate-detail.html?id=${c.CandidateID}`);
            container.appendChild(card);
        });

    } catch(err){
        console.error("Failed to load Kathmandu candidates:", err);
        document.getElementById("candidateGrid").innerHTML="<p style='text-align:center;color:red;'>Failed to load candidates.</p>";
    }
}

loadKathmanduCandidates();
</script>

</body>
</html>
