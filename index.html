<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>नेपाल निर्वाचन विश्लेषण ड्यासबोर्ड 2082</h1>
</header>





<!-- ===== DASHBOARD ANALYTICS SECTION ===== -->

<div class="dashboard-section">

  <div class="summary-grid">
    <div class="card"><h3 class="counter" id="totalCandidates">0</h3><p>Total Candidates</p></div>
    <div class="card"><h3 class="counter" id="totalParties">0</h3><p>Total Political Parties</p></div>
<div class="card"><h3 class="counter" id="totalConstituencies">0</h3><p>Total Electoral Areas</p></div>
    <div class="card"><h3 class="counter" id="totalDistricts">0</h3><p>Total Districts</p></div>
  </div>

  <div class="charts-grid">
    <div class="chart-box">
      <h3>Gender Distribution</h3>
      <canvas id="genderChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Age Group Distribution</h3>
      <canvas id="ageChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Registered by State</h3>
      <canvas id="stateChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Top Parties</h3>
      <canvas id="partyChart"></canvas>
    </div>
  </div>

</div>

<button id="darkToggle" class="dark-btn">🌙 Dark Mode</button>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
