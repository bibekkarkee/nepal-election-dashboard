<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* Minimal CSS for hero, counters, candidate cards */
body {font-family:'Segoe UI',sans-serif; margin:0; padding:0; background:#f5f5f5;}
.hero-banner {background:#1e3c72;color:#fff;padding:50px 20px;text-align:center;}
.hero-counters {display:flex; justify-content:center; flex-wrap:wrap; gap:20px; margin-top:20px;}
.counter-box {background:rgba(255,255,255,0.1);padding:15px 20px;border-radius:10px; min-width:120px;}
.candidate-grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px;}
.candidate-card {background:white;padding:15px;border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.08); cursor:pointer; transition:.3s;}
.candidate-card:hover {transform:translateY(-5px);}
.candidate-card img {width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom:10px;}
.candidate-card h3 {margin:5px 0;font-size:18px;}
.candidate-card p {margin:3px 0;font-size:14px;color:#555;}
</style>
</head>
<body>

<!-- Hero Section -->
<section class="hero-banner">
  <h1>नेपाल निर्वाचन ड्यासबोर्ड</h1>
  <p>अत्याधुनिक र वास्तविक समयको निर्वाचन परिणामहरू, सबै प्रदेश र जिल्लाहरूको जानकारी सहित।</p>

  <div class="hero-counters">
    <div class="counter-box">
      <h3 id="totalCandidates">0</h3>
      <p>Candidates</p>
    </div>
    <div class="counter-box">
      <h3 id="totalConstituencies">0</h3>
      <p>Electoral Areas</p>
    </div>
    <div class="counter-box">
      <h3 id="totalDistricts">0</h3>
      <p>Districts</p>
    </div>
    <div class="counter-box">
      <h3 id="totalParties">0</h3>
      <p>Political Parties</p>
    </div>
  </div>
</section>

<!-- Candidate Profiles Section -->
<section>
  <h2 style="text-align:center; margin-top:40px;">Candidate Profiles</h2>
  <div class="candidate-grid" id="candidateGrid"></div>
  <div style="text-align:center; margin:20px;">
    <a href="candidate.html" style="padding:10px 20px; background:#1e3c72; color:#fff; border-radius:8px; text-decoration:none;">View All Candidates</a>
  </div>
</section>

<script>
// Fetch data using Netlify proxy
async function loadDashboard(){
  try{
    const res = await fetch("/.netlify/functions/proxy");
    const json = await res.json();
    const candidates = JSON.parse(json.contents);

    // Counters
    document.getElementById("totalCandidates").textContent = candidates.length;
    document.getElementById("totalDistricts").textContent = [...new Set(candidates.map(c=>c.DistrictName))].length;
    document.getElementById("totalParties").textContent = [...new Set(candidates.map(c=>c.PoliticalPartyName))].length;
    document.getElementById("totalConstituencies").textContent = 165; // total electoral constituencies in Nepal

    // Show 8 random candidates
    const candidateGrid = document.getElementById("candidateGrid");
    const shuffled = candidates.sort(()=>0.5-Math.random()).slice(0,8);
    shuffled.forEach(c=>{
      const card = document.createElement("div");
      card.className="candidate-card";
      card.innerHTML=`
        <img src="https://result.election.gov.np/Images/Candidate/${c.CandidateID}.jpg" alt="${c.CandidateName}">
        <h3>${c.CandidateName}</h3>
        <p><strong>Province:</strong> ${c.StateName}</p>
        <p><strong>District:</strong> ${c.DistrictName}</p>
        <p><strong>Constituency:</strong> ${c.SCConstID}</p>
        <p><strong>Party:</strong> ${c.PoliticalPartyName}</p>
      `;
      card.addEventListener("click", ()=> window.location.href=`candidate-detail.html?id=${c.CandidateID}`);
      candidateGrid.appendChild(card);
    });

  }catch(err){
    console.error(err);
    document.getElementById("candidateGrid").innerHTML="<p style='text-align:center;color:red;'>Failed to load candidates.</p>";
  }
}
loadDashboard();
</script>

</body>
</html>
