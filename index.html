<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election 2082 | Live Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="hero">
  <div class="hero-content">
    <h1>🇳🇵 Nepal Election 2082</h1>
    <p class="subtitle">Live Results Dashboard</p>
  </div>
  <div class="countdown">
    Next Refresh In: <span id="countdownTimer">30</span>s
  </div>
</header>

<div class="container">

  <!-- Summary Cards -->
  <div id="summaryCards" class="summary-cards"></div>

  <!-- Filters -->
  <div class="filters">
    <input type="text" id="search" placeholder="Search candidate/party..." onkeyup="filterData()">
    <select id="provinceFilter" onchange="filterData()"><option value="">All Provinces</option></select>
    <select id="districtFilter" onchange="filterData()"><option value="">All Districts</option></select>
    <select id="partyFilter" onchange="filterData()"><option value="">All Parties</option></select>
  </div>

  <!-- Dashboard -->
  <div class="dashboard">

    <!-- Candidate Table -->
    <div class="card table-card">
      <div id="loading">Loading live results...</div>
      <table id="table" style="display:none">
        <thead><tr id="tableHeader"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Detail Panel -->
    <div id="candidateDetail" class="card detail-panel">
      <p>Select a candidate to see details</p>
    </div>

    <!-- Charts + Map -->
    <div class="charts-map">
      <canvas id="seatChart"></canvas>
      <canvas id="voteChart"></canvas>
      <div id="mapContainer" class="card map-card"></div>
    </div>

  </div>

</div>

<footer>
  Auto-refresh every 30 seconds | Source: <a href="https://result.election.gov.np/" target="_blank">Election Commission</a>
</footer>

<script src="js/app.js"></script>
</body>
</html>
