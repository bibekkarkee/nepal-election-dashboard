<!DOCTYPE html>
<html lang="eng">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>



<!-- ===== CANDIDATE PROFILES SECTION ===== -->
<section class="candidate-profiles" id="candidateProfiles">
  <h2>Candidate Profiles</h2>
  <div class="candidate-grid" id="candidateGrid">
    <!-- 4 random candidate cards will be inserted here -->
  </div>
  <div style="margin-top:20px; text-align:center;">
    <a href="candidate.html" class="btn-hero">View All Candidates</a>
  </div>
</section>


 <!-- ===== DASHBOARD ANALYTICS SECTION ===== -->
  <div class="charts-grid">
    <div class="chart-box">
      <h3>Gender Distribution</h3>
      <canvas id="genderChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Age Group Distribution</h3>
      <canvas id="ageChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Registered by State</h3>
      <canvas id="stateChart"></canvas>
    </div>
  </div>

      <div class="summary-grid">
  <!-- ===== TOP PARTIES SECTION ===== -->
<div class="top-parties-section">
  <h2>Top Parties by Candidate Count</h2>
  <div class="top-parties-grid" id="topPartiesContainer">
    <!-- Party cards will be inserted here dynamically -->
  </div>
</div>
  </div>

</div>

<button id="darkToggle" class="dark-btn">🌙 Dark Mode</button>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
