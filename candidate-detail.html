<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candidate Profile</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family:'Segoe UI',sans-serif; background:#f5f5f5; margin:0; padding:0;}
.page-header { display:flex; justify-content:space-between; align-items:center; background:#1e3c72; color:white; padding:20px 30px; flex-wrap:wrap;}
.page-header h1 { margin:0; font-size:28px;}
.btn-hero {display:inline-block; padding:10px 20px; font-size:14px; font-weight:600; color:white; background:#ff9f00; border-radius:6px; text-decoration:none; transition:.3s;}
.btn-hero:hover { background:#ffb733;}
.profile-card { max-width:600px; margin:30px auto; background:white; padding:20px; border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,0.1);}
.profile-card img { width:100%; height:300px; object-fit:cover; border-radius:8px; margin-bottom:15px;}
.profile-card .party-logo { width:50px; height:50px; object-fit:contain; vertical-align:middle; margin-right:10px;}
.profile-card h2 { margin:10px 0; }
.profile-card p { font-size:16px; margin:5px 0; }
</style>
</head>
<body>

<header class="page-header">
<h1>Candidate Profile</h1>
<a href="candidate.html" class="btn-hero">Back to Candidates</a>
</header>

<div class="profile-card" id="profileCard">
<p style="text-align:center;">Loading candidate details...</p>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const candidateID = urlParams.get('id');
const mainURL = "/api/proxy";

async function loadCandidate(){
    const res = await fetch(mainURL);
    const data = await res.json();
    const candidate = data.find(c=>c.CandidateID==candidateID);
    const container = document.getElementById("profileCard");
    if(!candidate){ container.innerHTML="<p style='text-align:center;color:red;'>Candidate not found.</p>"; return;}

    const candidateImg = `https://result.election.gov.np/Images/Candidate/${candidate.CandidateID||0}.jpg`;
    const partyLogo = candidate.SYMBOLCODE ? `https://result.election.gov.np/Images/Symbol/${candidate.SYMBOLCODE}.jpg` : "https://via.placeholder.com/50";

    container.innerHTML = `
        <img src="${candidateImg}" alt="${candidate.CandidateName||'-'}">
        <h2>${candidate.CandidateName||'-'}</h2>
        <p><img src="${partyLogo}" class="party-logo" alt="${candidate.PoliticalPartyName||'-'}"> ${candidate.PoliticalPartyName||'-'}</p>
        <p><strong>Province:</strong> ${candidate.StateName||'-'}</p>
        <p><strong>District:</strong> ${candidate.DistrictName||'-'}</p>
        <p><strong>Constituency:</strong> ${candidate.SCConstID||'-'}</p>
        <p><strong>Gender:</strong> ${candidate.Gender||'-'}</p>
        <p><strong>Age:</strong> ${candidate.AGE_YR||'-'}</p>
        <p><strong>Qualification:</strong> ${candidate.QUALIFICATION||'-'}</p>
        <p><strong>Father's Name:</strong> ${candidate.FATHER_NAME||'-'}</p>
        <p><strong>Spouse:</strong> ${candidate.SPOUCE_NAME||'-'}</p>
        <p><strong>Address:</strong> ${candidate.ADDRESS||'-'}</p>
    `;
}
loadCandidate();
</script>
</body>
</html>
