<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Detail</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{font-family:'Segoe UI',sans-serif; background:#f5f5f5; margin:0; padding:0;}
.header{background:#1e3c72;color:white;padding:20px;text-align:center;}
.profile{max-width:500px;margin:30px auto;background:white;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
.profile img{width:100%; height:300px; object-fit:cover; border-radius:10px; margin-bottom:15px;}
.profile h2{margin:10px 0;font-size:22px;}
.profile p{margin:5px 0;font-size:16px; color:#555;}
</style>
</head>
<body>
<div class="header"><h1>Candidate Profile</h1></div>
<div class="profile" id="profile"></div>

<script>
async function loadCandidate(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  try{
    const res = await fetch("/.netlify/functions/proxy");
    const data = await res.json();
    const candidates = JSON.parse(data.contents);
    const c = candidates.find(x=>x.CandidateID==id);
    if(!c){document.getElementById("profile").innerHTML="<p>Candidate not found.</p>"; return;}
    const container = document.getElementById("profile");
    container.innerHTML=`
      <img src="https://result.election.gov.np/Images/Candidate/${c.CandidateID}.jpg" alt="${c.CandidateName}">
      <h2>${c.CandidateName}</h2>
      <p><strong>Province:</strong> ${c.StateName}</p>
      <p><strong>District:</strong> ${c.DistrictName}</p>
      <p><strong>Constituency:</strong> ${c.SCConstID}</p>
      <p><strong>Party:</strong> ${c.PoliticalPartyName}</p>
      <p><strong>Gender:</strong> ${c.Gender}</p>
      <p><strong>Age:</strong> ${c.AGE_YR}</p>
      <p><strong>Qualification:</strong> ${c.QUALIFICATION || '-'}</p>
      <p><strong>Father Name:</strong> ${c.FATHER_NAME || '-'}</p>
      <p><strong>Permanent Address:</strong> ${c.ADDRESS || '-'}</p>
    `;
  }catch(err){
    console.error(err);
    document.getElementById("profile").innerHTML="<p style='color:red;'>Failed to load candidate details.</p>";
  }
}
loadCandidate();
</script>
</body>
</html>
